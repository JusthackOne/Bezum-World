name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Lint frontend
        working-directory: frontend
        run: bun run lint

      - name: Install backend dependencies
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: backend
        run: bun run prisma:generate

      - name: Lint backend
        working-directory: backend
        run: bun run lint

  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      - name: Install backend dependencies
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: backend
        run: bun run prisma:generate

      - name: Build backend
        working-directory: backend
        run: bun run build
